name: Build Multi-Platform Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      bigint_graceful:
        description: "Enable BIGINT_GRACEFUL flag (0 or 1)"
        required: false
        default: "1"

env:
  IMAGE_NAME: postgres-plv8
  PLATFORMS: linux/amd64,linux/arm64
  POSTGRES_VERSION: 18-alpine

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: ⚙️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Set up QEMU for multi-platform
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=PostgreSQL with PL/V8 extension
            org.opencontainers.image.url=${{ github.repositoryUrl }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BIGINT_GRACEFUL=${{ github.event.inputs.bigint_graceful || '1' }}
          outputs: type=image,name=target

      - name: ✅ Verify multi-platform image
        if: github.event_name != 'pull_request'
        run: |
          echo "🎉 Build completed successfully!"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}"
          echo "Tags: latest, ${{ github.sha }}, ${{ github.ref_name }}"
          echo ""
          echo "Platforms:"
          docker buildx imagetools inspect ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name || 'latest' }}
