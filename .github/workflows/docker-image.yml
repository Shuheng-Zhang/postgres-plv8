name: Build Multi-Platform Docker Image

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      bigint_graceful:
        description: "Enable BIGINT_GRACEFUL flag (0 or 1)"
        required: false
        default: "1"
      skip_arm64:
        description: "Skip ARM64 build (for faster testing)"
        required: false
        default: "false"

env:
  IMAGE_NAME: postgres-plv8
  PLATFORMS: linux/amd64,linux/arm64
  POSTGRES_VERSION: 18-alpine

jobs:
  # ========== 准备阶段 ==========
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ env.IMAGE_NAME }}
      tags: ${{ steps.meta.outputs.tags }}
      bigint_graceful: ${{ github.event.inputs.bigint_graceful || '1' }}
      skip_arm64: ${{ github.event.inputs.skip_arm64 || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=true

      - name: Export outputs
        run: |
          echo "Image name: ${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "BIGINT_GRACEFUL: ${{ github.event.inputs.bigint_graceful || '1' }}"

  # ========== AMD64 构建阶段 ==========
  build-amd64:
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AMD64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          tags: ${{ needs.prepare.outputs.tags }}
          outputs: type=docker,dest=/tmp/image-amd64.tar
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          build-args: |
            BIGINT_GRACEFUL=${{ needs.prepare.outputs.bigint_graceful }}

      - name: Upload AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-amd64
          path: /tmp/image-amd64.tar
          retention-days: 1

  # ========== ARM64 构建阶段 ==========
  build-arm64:
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 75
    if: needs.prepare.outputs.skip_arm64 == 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: false
          tags: ${{ needs.prepare.outputs.tags }}
          outputs: type=docker,dest=/tmp/image-arm64.tar
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
          build-args: |
            BIGINT_GRACEFUL=${{ needs.prepare.outputs.bigint_graceful }}

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-arm64
          path: /tmp/image-arm64.tar
          retention-days: 1

  # ========== 合并并推送阶段 ==========
  merge-and-push:
    runs-on: ubuntu-latest
    needs: [prepare, build-amd64, build-arm64]
    if: github.event_name != 'pull_request'
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download AMD64 artifact
        uses: actions/download-artifact@v4
        with:
          name: image-amd64
          path: /tmp

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: image-arm64
          path: /tmp

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load AMD64 image
        run: |
          docker load --input /tmp/image-amd64.tar
          docker tag ${{ needs.prepare.outputs.tags }} ${{ needs.prepare.outputs.tags }}-amd64

      - name: Load ARM64 image
        run: |
          docker load --input /tmp/image-arm64.tar
          docker tag ${{ needs.prepare.outputs.tags }} ${{ needs.prepare.outputs.tags }}-arm64

      - name: Create multi-platform manifest
        run: |
          # 创建 manifest list
          docker manifest create \
            ${{ needs.prepare.outputs.tags }} \
            ${{ needs.prepare.outputs.tags }}-amd64 \
            ${{ needs.prepare.outputs.tags }}-arm64

          # 为每个架构添加平台信息
          docker manifest annotate \
            ${{ needs.prepare.outputs.tags }} \
            ${{ needs.prepare.outputs.tags }}-amd64 \
            --os linux --arch amd64

          docker manifest annotate \
            ${{ needs.prepare.outputs.tags }} \
            ${{ needs.prepare.outputs.tags }}-arm64 \
            --os linux --arch arm64

          # 推送 manifest
          docker manifest push ${{ needs.prepare.outputs.tags }}

      - name: Verify multi-platform image
        run: |
          echo "✅ Multi-platform image created successfully!"
          echo ""
          echo "Image: ${{ needs.prepare.outputs.tags }}"
          echo ""
          echo "Platforms:"
          docker buildx imagetools inspect ${{ needs.prepare.outputs.tags }}

      - name: Clean up artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            image-amd64
            image-arm64

  # ========== 快速测试（仅 AMD64） ==========
  test-amd64-only:
    runs-on: ubuntu-latest
    needs: prepare
    if: github.event.inputs.skip_arm64 == 'true' && github.event_name != 'pull_request'
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push AMD64 only
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ needs.prepare.outputs.tags }}
          cache-from: type=gha,scope=amd64-test
          cache-to: type=gha,mode=max,scope=amd64-test
          build-args: |
            BIGINT_GRACEFUL=${{ needs.prepare.outputs.bigint_graceful }}

      - name: Verify AMD64 image
        run: |
          echo "✅ AMD64-only image pushed successfully!"
          docker buildx imagetools inspect ${{ needs.prepare.outputs.tags }}
