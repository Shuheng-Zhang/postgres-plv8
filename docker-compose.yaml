volumes:
  rs-postgres-js-vol:

services:
  rs-postgres:
    image: postgres:alpine
    container_name: "rs-postgres-js"
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - rs-postgres-js-vol:/var/lib/postgresql

